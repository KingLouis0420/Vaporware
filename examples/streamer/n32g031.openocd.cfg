# OpenOCD config for N32G031K8Q7-1 via ST-Link V2
# N32G031: ARM Cortex-M0+, 64KB flash @ 0x08000000, 8KB SRAM @ 0x20000000
# IDCODE: 0x0bb11477
#
# Based on stm32g0x.cfg (which successfully connects) but with N32G031 IDCODE
# and WITHOUT the STM32G0 DBGMCU examine-end hook (writes 0x40015804/08,
# which are NOT valid on N32G031 — could corrupt peripheral state).

source [find interface/stlink.cfg]
source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

set _CHIPNAME n32g031

# Use CPUTAPID 0 to skip IDCODE check — N32G031 reads 0x0bb11477
# (stm32g0x.cfg expects 0x0bc11477 and fails, but connects fine otherwise)
set _CPUTAPID 0

swj_newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian little -dap $_CHIPNAME.dap

$_TARGETNAME configure \
    -work-area-phys 0x20000000 \
    -work-area-size 0x1000 \
    -work-area-backup 0

adapter speed 2000
reset_config srst_nogate
